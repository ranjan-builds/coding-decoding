<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coding-Decoding Reasoning Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <meta
      property="og:url"
      content="https://ranjan-builds.github.io/coding-decoding/"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Coding-Decoding " />
    <meta property="og:description" content="Reasoning Practice" />
    <meta property="og:image" content="https://i.ibb.co/svNK4mGg/blob.jpg" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap");

      body {
        font-family: "Inter", sans-serif;
        background-color: #09090b; /* zinc-950 */
      }

      .mono-font {
        font-family: "JetBrains Mono", monospace;
      }

      /* Custom scrollbar for reference table */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #09090b;
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #27272a;
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #3f3f46;
      }

      .shake {
        animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
      }

      @keyframes shake {
        10%,
        90% {
          transform: translate3d(-1px, 0, 0);
        }
        20%,
        80% {
          transform: translate3d(2px, 0, 0);
        }
        30%,
        50%,
        70% {
          transform: translate3d(-4px, 0, 0);
        }
        40%,
        60% {
          transform: translate3d(4px, 0, 0);
        }
      }

      /* Commercial Glow Effects */
      .glow-text {
        text-shadow: 0 0 20px rgba(34, 211, 238, 0.4);
      }
      .glow-box {
        box-shadow: 0 0 30px rgba(34, 211, 238, 0.05);
      }

      /* Enhanced Commercial Background */
      body {
        background-color: #050505;
        background-image:
          radial-gradient(
            circle at 50% 0%,
            rgba(34, 211, 238, 0.05) 0%,
            transparent 60%
          ),
          linear-gradient(
            to right,
            rgba(255, 255, 255, 0.02) 1px,
            transparent 1px
          ),
          linear-gradient(
            to bottom,
            rgba(255, 255, 255, 0.02) 1px,
            transparent 1px
          );
        background-size:
          100% 100%,
          40px 40px,
          40px 40px;
      }

      /* Range slider styling */
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 18px;
        width: 18px;
        border-radius: 50%;
        background: #22d3ee;
        cursor: pointer;
        box-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
        transition: transform 0.1s;
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
      }
    </style>
  </head>
  <body
    class="text-zinc-300 min-h-screen flex flex-col selection:bg-cyan-500/30 selection:text-cyan-200"
  >
    <!-- Header -->
    <header
      class="bg-black/60 backdrop-blur-2xl text-zinc-100 py-4 border-b border-white/5 sticky top-0 z-50"
    >
      <div class="max-w-5xl mx-auto px-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <div
            class="bg-gradient-to-br from-cyan-400 to-blue-600 p-2 rounded-lg text-black shadow-[0_0_15px_rgba(34,211,238,0.3)]"
          >
            <i class="ph ph-brain text-2xl"></i>
          </div>
          <h1
            class="text-xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white via-cyan-100 to-zinc-400"
          >
            LogicTrainer
          </h1>
        </div>
        <div class="flex items-center gap-3">
          <div
            class="flex gap-4 text-sm font-medium bg-zinc-900/80 px-5 py-2.5 rounded-full border border-white/5 shadow-inner hidden sm:flex"
          >
            <span
              id="streak-counter"
              class="text-orange-400 flex items-center gap-1.5"
              ><i class="ph-fill ph-fire"></i> 0</span
            >
            <span class="text-zinc-700">|</span>
            <span id="score-counter" class="text-cyan-400">Score: 0/0</span>
          </div>
          <button
            id="open-settings-btn"
            class="p-2.5 bg-zinc-900/80 hover:bg-zinc-800 rounded-full border border-white/5 transition-all text-zinc-400 hover:text-cyan-400 hover:shadow-[0_0_10px_rgba(34,211,238,0.2)]"
            title="Settings"
          >
            <i class="ph-bold ph-gear-six text-lg"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main
      class="flex-grow max-w-5xl mx-auto px-4 py-10 w-full grid grid-cols-1 md:grid-cols-12 gap-8"
    >
      <!-- Left Column: Controls & Practice Area -->
      <div class="md:col-span-8 flex flex-col gap-8">
        <!-- Mode Selection -->
        <div class="flex flex-col gap-3">
          <h2
            class="text-xs font-bold text-zinc-500 uppercase tracking-widest pl-1"
          >
            Practice Mode
          </h2>
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-3" id="mode-buttons">
            <button
              data-mode="forward"
              class="mode-btn active bg-cyan-500/10 text-cyan-400 border border-cyan-500/30 font-medium py-3 px-3 rounded-xl transition-all hover:bg-cyan-500/20 flex flex-col items-center justify-center gap-1 text-sm shadow-[0_0_15px_rgba(34,211,238,0.1)]"
            >
              <span class="text-lg font-bold">A=1</span>
              <span class="text-xs opacity-80">Forward Num</span>
            </button>
            <button
              data-mode="letterMath"
              class="mode-btn bg-zinc-900/50 text-zinc-400 border border-white/5 font-medium py-3 px-3 rounded-xl transition-all hover:bg-zinc-800 hover:text-zinc-300 flex flex-col items-center justify-center gap-1 text-sm"
            >
              <span class="text-lg font-bold">A+2=C</span>
              <span class="text-xs opacity-80">Letter + N</span>
            </button>
            <button
              data-mode="opposite"
              class="mode-btn bg-zinc-900/50 text-zinc-400 border border-white/5 font-medium py-3 px-3 rounded-xl transition-all hover:bg-zinc-800 hover:text-zinc-300 flex flex-col items-center justify-center gap-1 text-sm"
            >
              <span class="text-lg font-bold">A=Z</span>
              <span class="text-xs opacity-80">Opposite Ltr</span>
            </button>
            <button
              data-mode="shift"
              class="mode-btn bg-zinc-900/50 text-zinc-400 border border-white/5 font-medium py-3 px-3 rounded-xl transition-all hover:bg-zinc-800 hover:text-zinc-300 flex flex-col items-center justify-center gap-1 text-sm"
            >
              <span class="text-lg font-bold">+N</span>
              <span class="text-xs opacity-80">Word Shift</span>
            </button>
          </div>
        </div>

        <!-- Active Practice Card -->
        <div
          class="bg-zinc-900/40 p-6 sm:p-10 rounded-3xl shadow-2xl border border-white/5 relative overflow-hidden backdrop-blur-sm glow-box"
        >
          <!-- Decorative background elements -->
          <div
            class="absolute -top-32 -right-32 w-64 h-64 bg-cyan-600 rounded-full blur-[100px] opacity-10"
          ></div>
          <div
            class="absolute -bottom-32 -left-32 w-64 h-64 bg-blue-600 rounded-full blur-[100px] opacity-10"
          ></div>

          <div class="relative z-10">
            <div class="flex justify-between items-start mb-8">
              <div>
                <span
                  id="current-rule-badge"
                  class="inline-flex items-center gap-1.5 bg-zinc-950 text-cyan-400 border border-cyan-500/20 text-xs font-bold px-3.5 py-1.5 rounded-full tracking-wide mb-3"
                >
                  <i class="ph ph-info"></i> Rule: A=1, B=2...
                </span>
                <h3 class="text-xl sm:text-2xl font-semibold text-white">
                  What is the code for:
                </h3>
              </div>
              <button
                id="skip-btn"
                class="bg-zinc-800/50 hover:bg-zinc-700 text-zinc-400 hover:text-white p-2.5 rounded-full transition-colors border border-white/5"
                title="Skip Question"
              >
                <i class="ph ph-skip-forward text-xl"></i>
              </button>
            </div>

            <div class="flex justify-center my-10">
              <div
                id="target-word"
                class="text-5xl sm:text-7xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-400 mono-font glow-text"
              >
                READY
              </div>
            </div>

            <div class="mb-2">
              <label
                for="answer-input"
                class="block text-sm font-medium text-zinc-500 mb-2 pl-1"
                id="input-hint"
              >
                Enter the code:
              </label>
              <div class="relative group">
                <!-- Fixed: Using text type with dynamic inputmode prevents <input type="number"> quirks -->
                <input
                  type="text"
                  id="answer-input"
                  autocomplete="off"
                  class="w-full text-xl sm:text-3xl p-5 bg-black/60 border-2 border-white/10 rounded-2xl focus:ring-4 focus:ring-cyan-500/10 focus:border-cyan-500/50 transition-all outline-none mono-font font-bold text-white uppercase placeholder-zinc-700"
                  placeholder="Type here..."
                />
              </div>
            </div>

            <!-- Feedback Area -->
            <div id="feedback-area" class="hidden mt-6 p-5 rounded-2xl border">
              <div class="flex items-start gap-4">
                <i id="feedback-icon" class="ph text-3xl mt-0.5"></i>
                <div class="flex-grow">
                  <h4 id="feedback-title" class="font-bold text-xl mb-1">
                    Feedback
                  </h4>
                  <p id="feedback-message" class="text-sm opacity-90"></p>
                  <div
                    id="explanation-box"
                    class="mt-4 bg-black/40 p-4 rounded-xl border border-white/5 hidden text-sm font-medium mono-font"
                  ></div>
                </div>
              </div>
              <div class="mt-5 flex justify-end">
                <button
                  id="next-btn"
                  class="hidden bg-white text-black hover:bg-zinc-200 px-6 py-2.5 rounded-xl font-bold transition-colors shadow-lg"
                >
                  Next Challenge <i class="ph-bold ph-arrow-right ml-1"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Column: Reference -->
      <div class="md:col-span-4 flex flex-col gap-3">
        <h2
          class="text-xs font-bold text-zinc-500 uppercase tracking-widest pl-1 hidden md:block"
        >
          Cheat Sheet
        </h2>
        <div
          class="bg-zinc-900/40 rounded-3xl shadow-xl border border-white/5 overflow-hidden flex flex-col h-full max-h-[600px] backdrop-blur-sm"
        >
          <div
            class="bg-zinc-950/50 text-zinc-300 p-5 flex justify-between items-center cursor-pointer border-b border-white/5"
            id="toggle-reference-btn"
          >
            <h3 class="font-bold flex items-center gap-2">
              <i class="ph ph-table text-cyan-500"></i> Alphabet Reference
            </h3>
            <i
              class="ph ph-caret-down transition-transform duration-300 text-zinc-500"
              id="ref-caret"
            ></i>
          </div>

          <div
            id="reference-content"
            class="p-2 overflow-y-auto custom-scrollbar flex-grow hidden md:block"
          >
            <table class="w-full text-sm text-center border-collapse">
              <thead
                class="text-zinc-500 font-semibold sticky top-0 bg-zinc-900/90 backdrop-blur-md"
              >
                <tr>
                  <th class="py-3 px-2 border-b border-white/5">Letter</th>
                  <th class="py-3 px-2 border-b border-white/5">Number</th>
                  <th class="py-3 px-2 border-b border-white/5">Opposite</th>
                </tr>
              </thead>
              <tbody id="reference-tbody" class="divide-y divide-white/5">
                <!-- Populated by JS -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <!-- Settings Modal -->
    <div
      id="settings-modal"
      class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300"
    >
      <div
        id="settings-card"
        class="bg-zinc-900/90 border border-white/10 p-7 rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.5)] w-full max-w-sm transform scale-95 transition-transform duration-300 relative backdrop-blur-xl"
      >
        <button
          id="close-settings-btn"
          class="absolute top-5 right-5 text-zinc-500 hover:text-white transition-colors bg-zinc-800/50 p-1.5 rounded-full"
        >
          <i class="ph ph-x text-lg"></i>
        </button>
        <h3 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
          <i class="ph-fill ph-sliders-horizontal text-cyan-400"></i> Practice
          Settings
        </h3>

        <div class="mb-8">
          <label
            class="flex justify-between items-end text-sm font-medium text-zinc-400 mb-4"
          >
            <span>Target Word Length</span>
            <span
              id="length-display"
              class="text-cyan-400 font-bold bg-cyan-950/50 px-3 py-1 rounded-lg border border-cyan-500/20"
              >5 Letters</span
            >
          </label>
          <input
            type="range"
            id="length-slider"
            min="3"
            max="8"
            value="5"
            class="w-full accent-cyan-500 bg-zinc-950 rounded-lg appearance-none h-2 border border-white/5 outline-none"
          />
          <div
            class="flex justify-between text-xs text-zinc-600 mt-3 font-mono font-bold px-1"
          >
            <span>3</span><span>4</span><span>5</span><span>6</span
            ><span>7</span><span>8</span>
          </div>
        </div>

        <button
          id="save-settings-btn"
          class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-black font-bold py-3.5 rounded-xl hover:from-cyan-400 hover:to-blue-500 transition-all shadow-[0_0_15px_rgba(34,211,238,0.2)] hover:shadow-[0_0_25px_rgba(34,211,238,0.4)]"
        >
          Apply & Restart
        </button>
      </div>
    </div>
    <footer
      class="bg-zinc-950 text-zinc-400 border-t border-white/10 py-8 font-sans selection:bg-cyan-500/30 selection:text-cyan-200"
    >
      <div
        class="max-w-5xl mx-auto px-6 flex flex-col sm:flex-row items-center justify-between gap-4"
      >
        <!-- Brand & Copyright -->
        <div class="flex items-center gap-2 text-sm">
          <span class="font-bold text-white tracking-tight">ranjan-builds</span>
          <span class="text-zinc-700">|</span>
          <span class="text-xs text-zinc-500">© 2026 All rights reserved.</span>
        </div>

        <!-- GitHub Link -->
        <a
          href="https://github.com/ranjan-builds"
          target="_blank"
          rel="noopener noreferrer"
          class="inline-flex items-center gap-2.5 px-4 py-2 rounded-full bg-zinc-900/80 border border-white/5 text-sm font-medium text-zinc-300 hover:text-cyan-400 hover:border-cyan-500/30 hover:bg-cyan-500/10 hover:shadow-[0_0_15px_rgba(34,211,238,0.15)] transition-all group"
        >
          <i
            class="ph-fill ph-github-logo text-lg text-white group-hover:text-cyan-400 transition-colors"
          ></i>
          <span>github.com/ranjan-builds</span>
          <i
            class="ph-bold ph-arrow-up-right text-xs opacity-70 group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform"
          ></i>
        </a>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
